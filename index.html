<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KI-radar">
  <title>KI-radar</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --border: #E9E9E7;
      --text: #37352F;
      --muted: #9B9A97;
      --subtle: #F1F1EF;
      --accent: #37352F;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    .header {
      padding: 48px 0 20px;
      margin-bottom: 4px;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header-date {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .header-date .weekday {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 2px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Section ── */
    .section { margin-bottom: 8px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── YouTube items ── */
    .yt-list { display: flex; flex-direction: column; gap: 2px; }

    .yt-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .yt-item:last-child { border-bottom: none; }

    .yt-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .yt-summary {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .yt-link {
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .yt-link:hover { opacity: 1; }

    /* ── News ── */
    .news-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

    .news-item {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      padding: 5px 0 5px 20px;
      position: relative;
    }
    .news-item::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--muted);
    }

    /* ── Tip ── */
    .tip-card {
      background: var(--subtle);
      border-radius: var(--radius);
      padding: 16px 18px;
      border-left: 3px solid var(--accent);
    }

    .tip-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.65;
    }

    /* ── Empty/loading ── */
    .state-message {
      text-align: center;
      padding: 80px 0 40px;
      color: var(--muted);
      font-size: 15px;
    }
    .state-message span {
      display: block;
      font-size: 32px;
      margin-bottom: 12px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(250, 250, 249, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }

    .nav-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }

    .nav-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: var(--subtle);
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-chip.active {
      background: var(--accent);
      color: #fff;
    }

    .nav-chip:not(.active):active {
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-eyebrow">KI-radar</div>
      <div class="header-date">
        <span class="weekday" id="weekday"></span>
        <span id="dateText">Laster...</span>
      </div>
    </header>
    <div id="content"></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-inner" id="navChips"></div>
  </nav>

  <script>
    let briefings = [];
    let current = 0;

    const DAYS = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
    const MONTHS = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function fmtLong(str) {
      const d = parseDate(str);
      return `${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }

    function fmtWeekday(str) {
      return DAYS[parseDate(str).getDay()];
    }

    function fmtShort(str) {
      const d = parseDate(str);
      return `${d.getDate()}. ${MONTHS[d.getMonth()].slice(0,3)}`;
    }

    function render(index) {
      current = index;
      const b = briefings[index];

      document.getElementById('weekday').textContent = fmtWeekday(b.date);
      document.getElementById('dateText').textContent = fmtLong(b.date);

      let html = '';

      if (b.youtube?.length) {
        html += `<section class="section">
          <div class="section-label"><span>📺</span> YouTube</div>
          <div class="yt-list">`;
        b.youtube.forEach(v => {
          html += `<div class="yt-item">
            <div class="yt-title">${esc(v.title)}</div>
            <div class="yt-summary">${esc(v.summary)}</div>
            <a class="yt-link" href="${esc(v.url)}" target="_blank" rel="noopener">Se video →</a>
          </div>`;
        });
        html += `</div></section><div class="divider"></div>`;
      }

      if (b.news?.length) {
        html += `<section class="section">
          <div class="section-label"><span>📰</span> Nytt fra feltet</div>
          <ul class="news-list">`;
        b.news.forEach(n => {
          html += `<li class="news-item">${esc(n)}</li>`;
        });
        html += `</ul></section><div class="divider"></div>`;
      }

      if (b.tip) {
        html += `<section class="section">
          <div class="section-label"><span>💡</span> Én ting å prøve</div>
          <div class="tip-card"><div class="tip-text">${esc(b.tip)}</div></div>
        </section>`;
      }

      if (!html) {
        html = `<div class="state-message"><span>🤔</span>Ingen innhold for denne dagen.</div>`;
      }

      document.getElementById('content').innerHTML = html;
      window.scrollTo({ top: 0, behavior: 'smooth' });

      document.querySelectorAll('.nav-chip').forEach((c, i) => {
        c.classList.toggle('active', i === index);
      });
    }

    function renderNav() {
      document.getElementById('navChips').innerHTML = briefings
        .map((b, i) => `<button class="nav-chip${i === 0 ? ' active' : ''}" onclick="render(${i})">${fmtShort(b.date)}</button>`)
        .join('');
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    async function init() {
      try {
        const res = await fetch('/briefings.json?v=' + Date.now());
        if (!res.ok) throw new Error();
        briefings = await res.json();
        if (!briefings.length) throw new Error();
        renderNav();
        render(0);
      } catch {
        document.getElementById('dateText').textContent = 'BriefBuddy';
        document.getElementById('content').innerHTML =
          `<div class="state-message"><span>☕</span>Første briefing kommer snart.</div>`;
      }
    }

    init();
  </script>
</body>
</html>
